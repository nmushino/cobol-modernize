<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Kafka Customer Point Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body {
  font-family: Arial;
  margin: 40px;
  background:#f5f7fb;
}

h1{
  margin-bottom:20px;
}

/* ===== Stats Card ===== */

.stats{
  display:flex;
  gap:20px;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  min-width:120px;
}

.card-title{
  font-size:12px;
  color:#777;
}

.card-value{
  font-size:26px;
  font-weight:bold;
}

/* ===== Chart ===== */

#chart{
  background:white;
  border-radius:8px;
  padding:10px;
  margin-bottom:20px;
}

/* ===== Messages ===== */

#messages{
  border:1px solid #ddd;
  padding:10px;
  height:350px;
  overflow:auto;
  background:white;
}

.message{
  padding:10px 14px;
  margin:6px 0;
  border-radius:6px;
  background:#f1f3f5;
  font-size:18px;
  font-weight:bold;
  color:#333;
  border-left:6px solid #2b7cff;
}

/* 最新値 */

.message:last-child{
  background:#e8f1ff;
  border-left:6px solid #ff7b00;
}

</style>
</head>

<body>

<h1>Kafka Customer Point</h1>

<div class="stats">

<div class="card">
<div class="card-title">Current</div>
<div id="current" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">Average</div>
<div id="avg" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">Max</div>
<div id="max" class="card-value">-</div>
</div>

<div class="card">
<div class="card-title">Min</div>
<div id="min" class="card-value">-</div>
</div>

</div>

<canvas id="chart" height="120"></canvas>

<div id="messages"></div>

<script>

const ctx = document.getElementById("chart").getContext("2d")

const chart = new Chart(ctx,{
 type:"line",
 data:{
   labels:[],
   datasets:[{
     label:"Customer Point",
     data:[],
     borderColor:"#2b7cff",
     fill:false,
     tension:0.2
   }]
 },
 options:{
   animation:false,
   responsive:true,
   scales:{
     x:{display:false}
   }
 }
})

async function loadMessages(){

  const res = await fetch("/messages")
  const data = await res.json()

  const div = document.getElementById("messages")
  div.innerHTML=""

  data.forEach(m=>{
    const line=document.createElement("div")
    line.className="message"
    line.textContent=m
    div.appendChild(line)
  })

  if(data.length>0){

    const nums=data.map(n=>Number(n))

    const current=nums[nums.length-1]
    const avg=Math.round(nums.reduce((a,b)=>a+b,0)/nums.length)
    const max=Math.max(...nums)
    const min=Math.min(...nums)

    document.getElementById("current").textContent=current
    document.getElementById("avg").textContent=avg
    document.getElementById("max").textContent=max
    document.getElementById("min").textContent=min

    chart.data.labels=nums.map((_,i)=>i)
    chart.data.datasets[0].data=nums

    chart.update()
  }

  if(data.length>300){
    div.scrollTop=div.scrollHeight
  }

}

setInterval(loadMessages,2000)

</script>

</body>
</html>
